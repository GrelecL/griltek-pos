name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  lint-store-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install ../shared-domain
      - run: pytest --cov=app --cov-report=term-missing -v

  test-store-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install ../shared-domain
      - run: pytest --cov=app --cov-report=term-missing -v

  lint-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backoffice, kiosk-selfcheckout, kiosk-pricecheck, kiosk-order, kds]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm install
      - run: npm run build
